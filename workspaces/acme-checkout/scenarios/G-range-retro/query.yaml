# The retrospective RANGE query — only answerable against a continuous, time-indexed corpus.
# Demonstrates the open-ended "what happened between these dates" capability.
id: G
slug: range-retro
label: "retro range"
workspace: acme-checkout
query: "why was checkout unstable between June 10 and June 12?"
mode: retrospective              # a CLOSED past range — expect a TIMELINE of events, not one root cause
range:
  from: 2026-06-10T00:00:00Z
  to:   2026-06-12T23:59:59Z
as_of: 2026-06-16T12:00:00Z      # asked later, looking back; full range is historical
severity: review
evidence: telemetry/
