# rate-limiter current config (CURRENT STATE, post dep-7e2a @ 2026-06-16T14:45Z).
# Safe range for max_tokens is ~50-200 (see runbooks/rate-limiter-operations.md).
# 10 is far below safe range: tiny buckets refill constantly -> far more redis round-trips and
# held connections per client -> pressure on the SHARED 50-connection pool.

throttle:
  window_seconds: 1
  burst: 20
  max_tokens: 10            # <-- was 100 before dep-7e2a
  backend: redis            # buckets stored in the SHARED redis instance (see ADR-014)
  pool: default
  clients:
    - checkout
    - cart
