name: CLI CI

# Lint, test, and build the Python CLI (src/cli) on every change to it.
on:
  push:
    branches: [main]
    paths:
      - 'src/cli/**'
      - '.github/workflows/cli-ci.yml'
  pull_request:
    paths:
      - 'src/cli/**'
      - '.github/workflows/cli-ci.yml'

# Cancel an in-progress run when a new commit is pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: src/cli/pyproject.toml

      # Install the package with its dev extras (pytest, ruff) plus the PEP 517
      # build frontend. requires-python is >=3.11, matched above.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Test (pytest)
        run: pytest -q

      - name: Build (wheel + sdist)
        run: python -m build
