name: Web CI

# Lint and build the Next.js admin dashboard (src/web) on every change to it.
on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'src/web/**'
      - '.github/workflows/web-ci.yml'

# Cancel an in-progress run when a new commit is pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be installed before setup-node so its `cache: pnpm` can
      # locate the pnpm store. Version is pinned to match local dev (lockfile v9).
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: src/web/pnpm-lock.yaml

      # Reuse Next.js' compilation cache across runs to speed up builds.
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: src/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('src/web/pnpm-lock.yaml') }}-${{ hashFiles('src/web/app/**', 'src/web/components/**', 'src/web/lib/**', 'src/web/hooks/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('src/web/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
